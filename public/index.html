<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFQI | VANGUARD_OS</title>
    <meta name="description" content="Digital Architect — Bengkulu, Indonesia">
    <meta name="theme-color" content="#00f2ff">
    <meta property="og:title" content="rifqi :: digital_architect">
    <meta property="og:description" content="Synthesizing virtual realities and building the future of code.">
    <meta property="og:image" content="2.png">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cyan: #00f2ff;
            --magenta: #ff00ff;
            --lime: #39ff14;
            --bg: #020204;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--bg); color: #fff; font-family: 'Fira Code', monospace; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        a, button { cursor: pointer; }

        /* ── tsParticles Canvas ─────────────────── */
        #tsparticles {
            position: fixed; inset: 0; z-index: 0;
        }

        /* ── Vignette ──────────────────────────── */
        .vignette {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.92) 100%);
            pointer-events: none;
        }

        /* ── Scanlines ─────────────────────────── */
        .scanlines {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 3px);
        }

        /* ── HUD ───────────────────────────────── */
        #hud { position: fixed; inset: 0; z-index: 5; pointer-events: none; padding: 28px; font-family: 'Fira Code', monospace; }
        .hud-corner { position: absolute; }
        .hud-tl { top: 28px; left: 28px; border-left: 2px solid var(--cyan); padding-left: 10px; }
        .hud-tr { top: 28px; right: 28px; border-right: 2px solid var(--cyan); padding-right: 10px; text-align: right; }
        .hud-bl { bottom: 28px; left: 28px; }
        .hud-label { font-size: 9px; letter-spacing: 3px; opacity: 0.4; margin-bottom: 4px; }
        .hud-val { font-size: 12px; font-weight: 600; letter-spacing: 2px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .hud-blink { animation: blink 1.8s ease-in-out infinite; }
        .hud-bar { height: 2px; background: rgba(255,255,255,0.08); margin-top: 8px; width: 160px; }
        .hud-bar-fill { height: 100%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); transition: width 1.5s ease; }

        /* ── SPLASH ────────────────────────────── */
        #splash {
            position: fixed; inset: 0; z-index: 100;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.9s ease;
        }
        #splash.out { opacity: 0; pointer-events: none; }

        .terminal-window {
            width: 480px;
            border: 1px solid rgba(0,242,255,0.25);
            background: rgba(2,2,8,0.95);
            box-shadow: 0 0 60px rgba(0,242,255,0.08);
        }
        .terminal-bar {
            background: rgba(0,242,255,0.06);
            border-bottom: 1px solid rgba(0,242,255,0.1);
            padding: 10px 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .t-dot { width: 10px; height: 10px; border-radius: 50%; }
        .t-red   { background: #ff5f57; }
        .t-yellow{ background: #febc2e; }
        .t-green { background: #28c840; }
        .t-title { font-size: 11px; opacity: 0.5; letter-spacing: 2px; margin-left: auto; }

        .terminal-body { padding: 24px; min-height: 180px; }
        .t-line { font-size: 12px; line-height: 2; color: rgba(255,255,255,0.7); }
        .t-line .prompt { color: var(--lime); }
        .t-line .cmd    { color: var(--cyan); }
        .t-line .key    { color: var(--magenta); }
        .t-line .val    { color: var(--lime); }
        .t-line .ok     { color: var(--lime); }
        .t-line .err    { color: #ff4444; }
        #cursor { display: inline-block; width: 8px; height: 14px; background: var(--cyan); vertical-align: middle; animation: blink 0.8s step-end infinite; margin-left: 2px; }

        #init-btn {
            display: block; width: 100%;
            padding: 14px;
            border: none; border-top: 1px solid rgba(0,242,255,0.15);
            background: rgba(0,242,255,0.05);
            color: var(--cyan); font-family: 'Fira Code', monospace; font-size: 13px;
            letter-spacing: 4px; cursor: pointer;
            transition: all 0.3s;
        }
        #init-btn:hover { background: var(--cyan); color: #000; box-shadow: 0 0 30px rgba(0,242,255,0.4); }
        #init-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ── CARD ──────────────────────────────── */
        #main-content { z-index: 10; perspective: 2000px; opacity: 0; transition: opacity 0.8s ease; }

        .frame-corner { position: absolute; width: 24px; height: 24px; }
        .fc-tl { top: 0; left: 0; border-top: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
        .fc-tr { top: 0; right: 0; border-top: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }
        .fc-bl { bottom: 0; left: 0; border-bottom: 2px solid var(--cyan); border-left: 2px solid var(--cyan); }
        .fc-br { bottom: 0; right: 0; border-bottom: 2px solid var(--cyan); border-right: 2px solid var(--cyan); }

        #card-frame { position: relative; padding: 8px; transition: transform 0.15s linear; transform-style: preserve-3d; }

        #profile-card {
            width: 360px;
            background: rgba(6, 6, 14, 0.82);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 0 0 1px rgba(0,242,255,0.05), 0 40px 80px rgba(0,0,0,0.9);
            position: relative; overflow: hidden;
        }

        /* Scan line over card */
        #profile-card::before {
            content: ''; position: absolute; left: 0; right: 0; height: 35%;
            background: linear-gradient(to bottom, transparent, rgba(0,242,255,0.03), transparent);
            animation: scanCard 5s linear infinite; pointer-events: none; z-index: 2;
        }
        @keyframes scanCard { 0%{top:-40%} 100%{top:140%} }

        .card-top-line { height: 2px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.5; }

        /* ── GLITCH NAME ───────────────────────── */
        .glitch {
            position: relative;
            font-family: 'Outfit', sans-serif;
            font-weight: 900; font-size: 3.5rem;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, #fff 40%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .glitch::before {
            left: 2px; text-shadow: none;
            animation: glitch1 4s infinite linear;
            clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
        }
        .glitch::after {
            left: -2px;
            animation: glitch2 4s infinite linear;
            clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
        }
        @keyframes glitch1 {
            0%,94%,100%  { transform: translate(0); filter: none; }
            95%   { transform: translate(-3px, 1px); filter: hue-rotate(90deg); }
            96%   { transform: translate(3px, -1px); }
            97%   { transform: translate(0); }
        }
        @keyframes glitch2 {
            0%,92%,100%  { transform: translate(0); filter: none; }
            93%   { transform: translate(3px, 2px); filter: hue-rotate(-90deg); }
            94%   { transform: translate(-3px, -1px); }
            95%   { transform: translate(0); }
        }

        /* ── Avatar ────────────────────────────── */
        @keyframes orbit { to { transform: rotate(360deg); } }
        @keyframes float6 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .avatar-float { animation: float6 6s ease-in-out infinite; }
        .orbit-ring { position: absolute; inset: -8px; border: 1.5px dashed rgba(0,242,255,0.4); border-radius: 50%; animation: orbit 12s linear infinite; }
        .orbit-ring2 { position: absolute; inset: -18px; border: 1px dashed rgba(255,0,255,0.2); border-radius: 50%; animation: orbit 20s linear infinite reverse; }

        /* ── Social ────────────────────────────── */
        .soc {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
        }
        .soc:hover { background: var(--cyan); color: #000; box-shadow: 0 0 20px rgba(0,242,255,0.5); transform: translateY(-6px) rotate(8deg); }

        /* ── Map ────────────────────────────────── */
        #map { height: 120px; border: 1px solid rgba(0,242,255,0.12); filter: brightness(0.65) saturate(0.3) hue-rotate(160deg); }

        /* ── Player ────────────────────────────── */
        #player {
            position: fixed; bottom: 28px; right: 28px; z-index: 20;
            background: rgba(4,4,12,0.92); backdrop-filter: blur(20px);
            border: 1px solid rgba(0,242,255,0.18);
            padding: 12px 16px; min-width: 270px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.7s ease 0.4s, transform 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s;
        }
        #player.show { opacity: 1; transform: translateY(0); }

        @keyframes spin { to { transform: rotate(360deg); } }
        .vinyl { font-size: 22px; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); animation: spin 6s linear infinite; animation-play-state: paused; }
        .vinyl.playing { animation-play-state: running; }

        .prog-bg { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; cursor: pointer; margin-top: 6px; }
        .prog-fill { height: 100%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); transition: width 0.1s linear; }
        .ctrl-btn { font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--cyan); transform: scale(1.2); }
        .ctrl-play { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
    </style>
</head>
<body>

<!-- tsParticles -->
<div id="tsparticles"></div>
<div class="vignette"></div>
<div class="scanlines"></div>

<!-- HUD -->

</div>

<!-- SPLASH / TERMINAL -->

<!-- MAIN PROFILE -->

                         style="width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid #000;box-shadow:0 0 30px rgba(0,242,255,0.2);position:relative;z-index:1;">
                </div>

                <!-- Name with glitch -->
                <h1 class="glitch" data-text="rifqi">rifqi</h1>

                <!-- Terminal tag -->
                <div style="font-size:11px;letter-spacing:3px;color:var(--magenta);background:rgba(255,0,255,0.07);border:1px solid rgba(255,0,255,0.15);padding:3px 12px;margin:10px 0 6px;">

                </div>

            <!-- Map -->
            <div style="padding: 0 24px 24px;">

            <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);"></div>

    </div>
</main>

<!-- Music Player -->
<div id="player">
    <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:42px;height:42px;border-radius:50%;background:#000;border:1px solid rgba(0,242,255,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
