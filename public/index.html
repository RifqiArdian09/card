<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIFQI | CREATIVE DEVELOPER</title>
    <meta name="description" content="Crafting digital experiences through minimal code and brutalist design.">
    <meta name="theme-color" content="#000000">
    <meta property="og:title" content="RIFQI | PORTFOLIO">
    <meta property="og:description" content="Crafting digital experiences through minimal code and brutalist design.">
    <meta property="og:image" content="2.png">
    <meta property="og:type" content="website">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['"Playfair Display"', 'serif'],
                        'sans': ['Inter', 'sans-serif'],
                        'mono': ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { cursor: crosshair; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #000; color: #fff; }
        a, button, [role="button"] { cursor: pointer; }

        /* Smooth selections */
        ::selection { background: #fff; color: #000; }

        /* Typography utils */
        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px #fff;
        }

        /* Vinyl Animation */
        .vinyl-spin { animation: spin 4s linear infinite; animation-play-state: paused; }
        .vinyl-spin.playing { animation-play-state: running; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Splash Screen */
        #splash { transition: opacity 0.8s ease; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        
        /* Audio Progress Bar */
        .progress-fill { transition: width 0.1s linear; }

        /* Remove default link outlines */
        a:focus, button:focus { outline: none; }
        
        /* Disable scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>

<body class="bg-black text-white min-h-screen relative flex items-center justify-center selection:bg-white selection:text-black">

    <!-- SPLASH SCREEN -->
    <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black text-white px-4">
        <h1 class="font-serif text-6xl uppercase tracking-tighter mb-12 select-none">RIFQI.</h1>
        <button id="init-btn"
            class="font-mono text-xs uppercase tracking-[0.3em] border border-white px-10 py-4 
                   hover:bg-white hover:text-black transition-colors duration-300">
            ENTER
        </button>
    </div>

    <!-- MAIN DASHBOARD (Mobile Portrait Locked) -->
    <main id="main-content" class="relative z-30 w-full max-w-[420px] mx-auto min-h-screen py-8 px-4 flex flex-col justify-center opacity-0 perspective-[2000px]">
        
        <!-- Grid Frame -->
        <div id="card-frame" class="w-full bg-white grid grid-cols-1 gap-[1px] border border-white shadow-[0_0_30px_rgba(255,255,255,0.05)]">
            
            <!-- HEADER -->
            <div class="bg-black p-8">
                <div class="font-mono text-[10px] uppercase tracking-[0.2em] flex justify-between opacity-50 mb-10">
                    <span>Portfolio</span>
                    <span>2026</span>
                </div>
                <h1 class="font-serif text-6xl md:text-[5rem] uppercase leading-none tracking-tighter mb-4 hover:outline-text transition-all duration-500">RIFQI.</h1>
                <p class="font-mono text-xs font-light uppercase tracking-[0.2em]">Creative Developer</p>
            </div>

            <!-- AVATAR -->
            <div class="bg-black relative group overflow-hidden h-[300px]">
                <img src="2.png" alt="Rifqi" class="absolute inset-0 w-full h-full object-cover grayscale transition-transform duration-[1.5s] ease-out group-hover:scale-105">
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center pointer-events-none">
                    <span class="font-mono text-[10px] uppercase tracking-widest border border-white px-4 py-2 bg-black/50 backdrop-blur-sm">PROFILE</span>
                </div>
            </div>

            <!-- PLAYER -->
            <div id="player" class="bg-black p-6 flex flex-col justify-center">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-record-vinyl text-xl vinyl-spin" id="vinyl-icon"></i>
                        <div class="min-w-0">
                            <div class="font-mono text-[9px] uppercase tracking-[0.2em] opacity-50 mb-1">Now Playing</div>
                            <div id="track-title" class="font-sans font-bold text-sm uppercase tracking-widest truncate w-[110px]">MIDNIGHT</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <i class="fas fa-step-backward text-sm cursor-pointer hover:opacity-50 transition-opacity" id="prev-btn"></i>
                        <i class="fas fa-play text-xl cursor-pointer hover:opacity-50 transition-opacity" id="play-pause-btn"></i>
                        <i class="fas fa-step-forward text-sm cursor-pointer hover:opacity-50 transition-opacity" id="next-btn"></i>
                    </div>
                </div>
                <div class="h-[2px] bg-white/20 w-full cursor-pointer relative" id="progress-bar-container">
                    <div class="absolute left-0 top-0 h-full bg-white progress-fill" id="progress" style="width: 0%;"></div>
                </div>
            </div>

            <!-- BIO -->
            <div class="bg-white text-black p-8">
                <p class="font-sans text-[15px] leading-relaxed font-medium mb-8">
                    Crafting digital experiences through minimal code and brutalist design.
                </p>
                <div class="flex justify-between items-end border-t border-black/20 pt-4">
                    <p class="font-mono text-[9px] uppercase tracking-widest">Location</p>
                    <p class="font-serif text-lg uppercase tracking-tighter">INDONESIA</p>
                </div>
            </div>

            <!-- LINKS 1 (2 Cols) -->
            <div class="bg-black grid grid-cols-2 gap-[1px]">
                <a href="https://github.com/RifqiArdian09" target="_blank" class="social-btn bg-black flex flex-col items-center justify-center gap-3 p-6 hover:bg-white hover:text-black transition-colors duration-300 group">
                    <i class="fab fa-github text-3xl group-hover:-rotate-12 transition-transform duration-300"></i>
                    <span class="font-mono uppercase text-[10px] tracking-widest font-bold">Github</span>
                </a>
                <a href="https://www.linkedin.com/in/rifqi-ardian/" target="_blank" class="social-btn bg-black flex flex-col items-center justify-center gap-3 p-6 hover:bg-white hover:text-black transition-colors duration-300 group">
                    <i class="fab fa-linkedin-in text-3xl group-hover:rotate-12 transition-transform duration-300"></i>
                    <span class="font-mono uppercase text-[10px] tracking-widest font-bold">LinkedIn</span>
                </a>
            </div>

            <!-- LINKS 2 (3 Cols) -->
            <div class="bg-black grid grid-cols-3 gap-[1px]">
                <a href="https://www.instagram.com/rifqiard._/" target="_blank" class="social-btn bg-black flex flex-col items-center justify-center gap-2 p-5 hover:bg-white hover:text-black transition-colors duration-300 group">
                    <i class="fab fa-instagram text-xl group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="font-mono text-[9px] uppercase tracking-widest">Insta</span>
                </a>
                <a href="https://rifqiardian.my.id/" target="_blank" class="social-btn bg-black flex flex-col items-center justify-center gap-2 p-5 hover:bg-white hover:text-black transition-colors duration-300 group">
                    <i class="fas fa-globe text-xl group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="font-mono text-[9px] uppercase tracking-widest">Web</span>
                </a>
                <a href="https://wa.me/message/2FOKORC6QSLSI1" target="_blank" class="social-btn bg-black flex flex-col items-center justify-center gap-2 p-5 hover:bg-white hover:text-black transition-colors duration-300 group">
                    <i class="fab fa-whatsapp text-xl group-hover:scale-110 transition-transform duration-300"></i>
                    <span class="font-mono text-[9px] uppercase tracking-widest">Chat</span>
                </a>
            </div>

        </div>
    </main>

    <audio id="bg-audio" loop></audio>

    <script src="script.js"></script>
</body>
</html>
