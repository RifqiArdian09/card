<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rifqi — digital architect</title>
    <meta name="description" content="rifqi ardian · digital architect · bengkulu, indonesia">
    <meta name="theme-color" content="#000010">
    <meta property="og:title" content="rifqi — digital architect">
    <meta property="og:description" content="Bengkulu, Indonesia · Building things that matter.">
    <meta property="og:image" content="2.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Aurora WebGL Background -->
<canvas id="aurora"></canvas>

<!-- Grain overlay -->
<div id="grain"></div>

<!-- Vignette -->
<div id="vignette"></div>

<!-- ── SPLASH ─────────────────────── -->
<div id="splash">
    <div id="splash-inner">
        <div id="splash-name">rifqi</div>
        <div id="splash-sub">digital architect</div>
        <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
        <div id="splash-hint">— click to enter —</div>
    </div>
</div>

<!-- ── MAIN ──────────────────────── -->
<main id="main">

    <!-- Holographic Card -->
    <div id="card-scene">
        <div id="card" role="main">
            <!-- Holo foil layer -->
            <div id="holo"></div>

            <!-- Edge glow -->
            <div id="card-edge"></div>

            <!-- Content -->
            <div id="card-content">

                <!-- Header -->
                <div id="card-header">
                    <div id="avatar-wrap">
                        <img src="2.png" alt="rifqi" id="avatar">
                        <div id="avatar-ring"></div>
                    </div>
                    <div id="header-text">
                        <h1 id="name">rifqi</h1>
                        <div id="role">digital_architect</div>
                        <div id="location"><i class="fas fa-location-dot"></i> Bengkulu, Indonesia</div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Bio -->
                <p id="bio">
                    Building interfaces that feel alive. Passionate about clean systems, creative code, and beautiful experiences.
                </p>

                <!-- Stats row -->
                <div id="stats">
                    <div class="stat"><span class="stat-val">3+</span><span class="stat-lbl">yrs exp</span></div>
                    <div class="stat-sep"></div>
                    <div class="stat"><span class="stat-val">20+</span><span class="stat-lbl">projects</span></div>
                    <div class="stat-sep"></div>
                    <div class="stat"><span class="stat-val">∞</span><span class="stat-lbl">coffee</span></div>
                </div>

                <!-- Divider -->
                <div class="divider"></div>

                <!-- Social links -->
                <div id="socials">
                    <a href="https://github.com/RifqiArdian09" target="_blank" class="soc-link" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/rifqi-ardian/" target="_blank" class="soc-link" title="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="https://www.instagram.com/rifqiard._/" target="_blank" class="soc-link" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://rifqiardian.my.id/" target="_blank" class="soc-link" title="Website">
                        <i class="fas fa-globe"></i>
                    </a>
                    <a href="https://wa.me/message/2FOKORC6QSLSI1" target="_blank" class="soc-link" title="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>

                <!-- Map -->
                <div id="map-wrap">
                    <div id="map-label"><i class="fas fa-satellite-dish"></i> live_location</div>
                    <div id="map"></div>
                </div>

            </div>
        </div>
    </div>

</main>

<!-- ── MUSIC PLAYER ───────────────── -->
<div id="player">
    <div id="player-track">
        <i class="fas fa-record-vinyl" id="vinyl"></i>
        <div id="player-meta">
            <div id="track-name">MIDNIGHT</div>
            <div id="prog-wrap"><div id="prog"></div></div>
        </div>
    </div>
    <div id="player-ctrls">
        <i class="fas fa-backward-step ctrl" id="prev-btn"></i>
        <i class="fas fa-play ctrl play-ctrl" id="play-btn"></i>
        <i class="fas fa-forward-step ctrl" id="next-btn"></i>
    </div>
</div>

<audio id="audio" loop></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
