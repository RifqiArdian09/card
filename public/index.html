    <script>

                    keyframes: {
                        pulseNeon: {

                            '50%': { boxShadow: '0 0 20px #00f2ff, 0 0 50px #00f2ff, 0 0 100px #00f2ff' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },

                        },
                        scanline: {
                            '0%': { top: '-100%' },
                            '100%': { top: '200%' },

                        meshMove: {
                            '0%, 100%': { transform: 'scale(1) rotate(0deg)' },

    <!-- Fonts -->

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { cursor: crosshair; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; overflow: hidden; }

        /* Mesh background */
        .mesh-bg {
            background-image:
                linear-gradient(rgba(0,242,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.04) 1px, transparent 1px),
                radial-gradient(rgba(0,242,255,0.07) 1.5px, transparent 1.5px);
            background-size: 60px 60px, 60px 60px, 30px 30px;
            animation: meshMove 60s ease-in-out infinite;
        }

        /* Scanline effect on card */
        .card-scan::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to bottom, transparent, rgba(0,242,255,0.04), transparent);
            animation: scanline 5s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        /* Avatar ring */
        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: -6px;
            border: 1.5px dashed rgba(0,242,255,0.6);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        /* Glow text */
        .glow-text {
            text-shadow: 0 0 10px rgba(0,242,255,0.5), 0 0 30px rgba(0,242,255,0.2);
        }

        /* Social button hover */
        .social-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .social-btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0,242,255,0.6);
            transform: translateY(-6px) rotate(8deg);
        }

        /* Corner brackets */
        .corner-tl { border-top: 2px solid #00f2ff; border-left: 2px solid #00f2ff; }
        .corner-tr { border-top: 2px solid #00f2ff; border-right: 2px solid #00f2ff; }
        .corner-bl { border-bottom: 2px solid #00f2ff; border-left: 2px solid #00f2ff; }
        .corner-br { border-bottom: 2px solid #00f2ff; border-right: 2px solid #00f2ff; }

        /* Progress bar */
        .progress-fill {
            transition: width 0.1s linear;
            box-shadow: 0 0 8px #00f2ff;
        }

        /* Vinyl spin */
        .vinyl-spin { animation: spin 6s linear infinite; animation-play-state: paused; }
        .vinyl-spin.playing { animation-play-state: running; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scanline { 0% { top: -100%; } 100% { top: 200%; } }
        @keyframes meshMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(1.5deg); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Splash */
        #splash { transition: opacity 0.8s ease; }
        #splash.hidden { opacity: 0; pointer-events: none; }

        /* HUD blink */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .hud-blink { animation: blink 1.5s ease-in-out infinite; }
    </style>
</head>
