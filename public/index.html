    <!-- FontAwesome -->

    <style>
        * {
            cursor: crosshair;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-color: #000;
            color: #fff;
        }

        /* Noise Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        a,
        button,
        [role="button"] {
            cursor: pointer;
        }

        ::selection {
            background: #fff;
            color: #000;
        }

        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1px #fff;
        }

        .vinyl-spin {
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }

        .vinyl-spin.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #splash {
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #splash.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .progress-fill {
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Hover card effect */
        .social-btn {
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .social-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: right;
        }

        .social-btn:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
    </style>
</head>
