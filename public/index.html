    <style>
        * { cursor: crosshair; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; overflow-x: hidden; background-color: #020204; }
        a, button, [role="button"] { cursor: pointer; }

        /* Blueprint Grid Background */
        .blueprint-bg {
            background-color: #020204;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* Glass / Cyber Panel */
        .cyber-panel {
            background: rgba(10, 13, 20, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 242, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,242,255,0.02);
            position: relative;
            transition: all 0.3s ease;
        }
        .cyber-panel:hover {
            border-color: rgba(0, 242, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,242,255,0.05);
        }

        /* Tech Corners for panels */
        .tech-corner {
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid #00f2ff;
        }
        .tc-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .tc-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .tc-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .tc-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* Glowing text utility */
        .glow-text {
            text-shadow: 0 0 15px rgba(0,242,255,0.6);
        }

        /* Buttons with hover sweep */
        .cyber-btn {
            background: rgba(0, 242, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.15);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .cyber-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: #00f2ff;
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
            transform: translateY(-2px);
        }
        .cyber-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }
        .cyber-btn:hover::after {
            left: 150%;
        }

        /* Hexagon Avatar mask */
        .hex-avatar {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        /* Radar spinning animation */
        @keyframes radarScan {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .radar-spinner {
            position: absolute;
            top: 50%; left: 50%;
            width: 200px; height: 200px;
            margin: -100px 0 0 -100px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 242, 255, 0.3);
            animation: radarScan 10s linear infinite;
        }
        .radar-spinner::before {
            content: '';
            position: absolute;
            top: -1px; left: 50%;
            width: 2px; height: 50%;
            background: #00f2ff;
            transform-origin: bottom center;
            box-shadow: 0 0 10px #00f2ff;
        }

        /* Audio Progress Bar */
        .progress-fill {
            transition: width 0.1s linear;
        }

        /* Vinyl Animation */
        .vinyl-spin { animation: spin 6s linear infinite; animation-play-state: paused; }
        .vinyl-spin.playing { animation-play-state: running; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Splash Screen */
        #splash { transition: opacity 0.8s ease; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        
        /* HUD Blink */
        .hud-blink { animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
